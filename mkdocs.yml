site_name: Group 8 — Edge Computing Cluster
site_description: AI-Based Threat Detection System | Cloud Computing SS2026 | Frankfurt UAS
site_author: Group 8
site_url: https://sapkale26.github.io/Cloud_Computing_Project/

repo_name: Sapkale26/Cloud_Computing_Project
repo_url: https://github.com/Sapkale26/Cloud_Computing_Project

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Tasks:
    - Task 1 — Cluster Boot: tasks/task-01-cluster-boot.md
    - Task 2 — HPL Benchmark: tasks/task-02-hpl.md
    - Task 3 — MPI: tasks/task-03-mpi.md
    - Task 4 — Scaling Laws: tasks/task-04-scaling-laws.md
    - Task 5 — Monitoring: tasks/task-05-monitoring.md
    - Task 6 — Edge AI: tasks/task-06-edge-ai.md
    - Task 7 — Backend & K8s: tasks/task-07-backend.md
    - Task 8 — Frontend: tasks/task-08-frontend.md
    - Task 9 — Telegram Bot: tasks/task-09-telegram.md
  - Benchmarks:
    - MPI Results: benchmarks/mpi-results.md
    - HPL Results: benchmarks/hpl-results.md
    - Amdahl's Law: benchmarks/amdahl-graphs.md
  - Runbook:
    - How to Start: runbook/how-to-restart.md
    - Troubleshooting: runbook/troubleshooting.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sapkale26/Cloud_Computing_Project
